name: Deploy to Static.app

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to Static.app
        uses: designmodo/static-app-deploy-action@v1
        with:
          api-token: ${{ secrets.STATIC_APP_API_KEY }}
